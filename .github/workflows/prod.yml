name: 🚀 Production Pipeline (GCP Cloud Run)

on:
  push:
    branches:
      - main

jobs:
  prod-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests and check coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=85

      # ==============================================================
      # SECCIÓN GOOGLE CLOUD PLATFORM (GCP)
      # ==============================================================

      - name: Authenticate to Google Cloud
        if: success()
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configure Docker for Artifact Registry
        if: success()
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker image
        if: success()
        run: |
          # Construye la imagen llamándola localmente primero
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/shipment-repo/shipment-api:latest .
          # Sube la imagen a Artifact Registry en GCP
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/shipment-repo/shipment-api:latest

      - name: Deploy to Cloud Run
        if: success()
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: shipment-api
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/shipment-repo/shipment-api:latest
          region: us-central1
          # Pasa la conexión a tu base de datos (PostgreSQL en Google Cloud SQL) desde los secretos
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
